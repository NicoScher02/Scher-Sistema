function generarQR(containerId, data, size) {
  // Pure JS QR Code generator (no external library needed)
  // Uses qrcode-generator approach via canvas
  const cont = document.getElementById(containerId);
  if (!cont) return;
  size = size || 160;

  // We use a script-injected QR approach with a tiny inline encoder
  // Data matrix using a simple QR-like visual for display
  // For real scanning we embed the data in a way readable by any QR scanner
  // Using the free QR API via data URI approach with JS only
  const encoded = encodeURIComponent(data);
  
  // Use an inline QR generation via Canvas with a simple algorithm
  cont.innerHTML = '';
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  cont.appendChild(canvas);
  
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'white';
  ctx.fillRect(0, 0, size, size);
  
  // Generate a deterministic QR-like pattern from the data string
  // This is a visual placeholder — for real scanning we generate via URL
  // We'll use Google Charts QR API (works offline once loaded) OR
  // generate using the qrcodejs approach
  
  // Better: use an img with QR API
  const img = document.createElement('img');
  img.crossOrigin = 'anonymous';
  img.style.cssText = 'width:' + size + 'px;height:' + size + 'px;display:block';
  img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=' + size + 'x' + size + '&data=' + encoded + '&margin=4';
  img.onerror = () => {
    // Fallback: draw a simple matrix pattern locally
    cont.innerHTML = '';
    const c2 = document.createElement('canvas');
    c2.width = size; c2.height = size;
    cont.appendChild(c2);
    drawFallbackQR(c2, data, size);
  };
  cont.innerHTML = '';
  cont.appendChild(img);
}

function drawFallbackQR(canvas, data, size) {
  // Offline fallback: deterministic pixel pattern from data hash
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'white';
  ctx.fillRect(0, 0, size, size);
  const cells = 21;
  const cell = Math.floor(size / cells);
  // Simple hash
  let hash = 5381;
  for (let i = 0; i < data.length; i++) hash = ((hash << 5) + hash) + data.charCodeAt(i);
  ctx.fillStyle = 'black';
  // Finder patterns (corners)
  [[0,0],[0,14],[14,0]].forEach(([r,c]) => {
    for (let i=0;i<7;i++) for (let j=0;j<7;j++) {
      if (i===0||i===6||j===0||j===6||(i>=2&&i<=4&&j>=2&&j<=4))
        ctx.fillRect((c+j)*cell,(r+i)*cell,cell,cell);
    }
  });
  // Data pattern
  for (let r = 0; r < cells; r++) {
    for (let c = 0; c < cells; c++) {
      if ((r<9&&c<9)||(r<9&&c>11)||(r>11&&c<9)) continue;
      const bit = (hash ^ (r*cells+c)*2654435761) & 1;
      if (bit) ctx.fillRect(c*cell, r*cell, cell, cell);
    }
  }
  // Text below
  ctx.font = '9px monospace';
  ctx.fillStyle = '#333';
  ctx.textAlign = 'center';
  ctx.fillText('Sin conexión', size/2, size-2);
}

function imprimirCodigosBulto() {
  const artId = parseInt(document.getElementById('cb-articulo')?.value);
  const art = DB.articulos.find(a=>a.id===artId);
  if (!art) return;
  const bulto = art.unidadesBulto || 1;
  const codBulto = 'BLT-' + art.codigo;

  // Generate barcode pattern
  let pattern = '101';
  for (let i = 0; i < codBulto.length; i++) {
    const c = codBulto.charCodeAt(i);
    const bits = ((c * 37 + 17) % 64 + 64).toString(2).padStart(7,'0');
    pattern += bits + '0';
  }
  pattern += '1100011101011';
  const bw = 2, bh = 60;
  const totalW = pattern.length * bw + 20;
  let barsHtml = '';
  for (let i = 0; i < pattern.length; i++) {
    if (pattern[i] === '1') barsHtml += `<rect x="${10+i*bw}" y="0" width="${bw}" height="${bh}" fill="black"/>`;
  }
  barsHtml += `<text x="${totalW/2}" y="${bh+16}" text-anchor="middle" font-family="monospace" font-size="12" fill="black">${codBulto}</text>`;
  barsHtml += `<text x="${totalW/2}" y="${bh+28}" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#333">${art.nombre} · ${bulto} u/bulto</text>`;

  const etiqueta = (n) => `
    <div style="display:inline-block;border:1px dashed #ccc;padding:12px 16px;margin:6px;text-align:center;border-radius:6px;page-break-inside:avoid">
      <div style="font-size:10px;color:#666;margin-bottom:4px">BULTO N° ${n}</div>
      <svg width="${totalW}" height="${bh+34}" viewBox="0 0 ${totalW} ${bh+34}">${barsHtml}</svg>
    </div>`;

  const contenido = `<!DOCTYPE html><html><head><title>Etiquetas — ${art.nombre}</title>
    <style>body{font-family:sans-serif;padding:20px} @media print{.no-print{display:none}} </style></head><body>
    <div class="no-print" style="margin-bottom:16px;display:flex;align-items:center;gap:12px">
      <strong>${art.nombre}</strong> — Código de bulto: <code>${codBulto}</code> — ${bulto} u/bulto
      <input type="number" id="qty" value="4" min="1" style="width:60px;padding:4px 8px;border:1px solid #ccc;border-radius:4px">
      <label style="font-size:13px">etiquetas</label>
      <button onclick="regenerar()" style="background:#5B1A8A;color:white;border:none;padding:8px 16px;border-radius:6px;cursor:pointer">Actualizar</button>
      <button onclick="window.print()" style="background:#16A34A;color:white;border:none;padding:8px 16px;border-radius:6px;cursor:pointer">🖨 Imprimir</button>
    </div>
    <div id="etiquetas-cont">${[1,2,3,4].map(n=>etiqueta(n)).join('')}</div>
    <script>
      function regenerar(){
        const q=parseInt(document.getElementById('qty').value)||1;
        const arr=[];for(let i=1;i<=q;i++)arr.push(i);
        document.getElementById('etiquetas-cont').innerHTML=arr.map(n=>\`${etiqueta('N').replace(/`/g,'\`').replace(/\${n}/g,'NNUM')}\`.replace('NNUM',n)).join('');
      }
    <\/script>
    </body></html>`;

  const blob = new Blob([contenido], {type:'text/html;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.target = '_blank';
  a.download = 'etiquetas-bulto-' + art.codigo + '.html';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
  showToast('Etiquetas descargadas — abrí el archivo e imprimí');
}

      </div>

    </div>

        ? `<button class="btn btn-success" onclick="marcarOrdenPreparada(${ordenId})" style="font-size:15px;padding:12px 24px">✅ Marcar como preparado</button>`
        : `<button class="btn btn-secondary" onclick="marcarOrdenPreparada(${ordenId})" style="opacity:0.6">Marcar preparado (incompleto)</button>`
      }
    </div>
  `, 'modal-lg');

  // Setup barcode scanner input
  setupBarcodeScanner(ordenId);
}

function setupBarcodeScanner(ordenId) {
  // Keep keyboard listener for physical barcode scanners (they type fast)
  let barcodeBuffer = '';
  let barcodeTimer = null;
  const handler = (e) => {
    if (e.key === 'Enter' && barcodeBuffer.length > 2) {
      procesarCodigoEscaneado(ordenId, barcodeBuffer.trim());
      barcodeBuffer = '';
      return;
    }
    if (e.key.length === 1) {
      barcodeBuffer += e.key;
      clearTimeout(barcodeTimer);
      barcodeTimer = setTimeout(() => { barcodeBuffer = ''; }, 200);
    }
  };
  document.addEventListener('keydown', handler);
  const checkClosed = setInterval(() => {
    if (!document.getElementById('overlay-modal-prep')) {
      document.removeEventListener('keydown', handler);
      clearInterval(checkClosed);
    }
  }, 500);
}

function abrirCamaraQR(ordenId) {
  // Inject camera scanner UI into the modal
  const cont = document.getElementById('qr-scanner-cont');
  if (!cont) return;

  cont.innerHTML = `
    <div style="background:#000;border-radius:var(--radius);overflow:hidden;position:relative;max-width:340px;margin:0 auto">
      <video id="qr-video" style="width:100%;display:block" playsinline autoplay></video>
      <canvas id="qr-canvas" style="display:none"></canvas>
      <div style="position:absolute;inset:0;pointer-events:none;display:flex;align-items:center;justify-content:center">
        <div style="width:200px;height:200px;border:3px solid rgba(255,255,255,0.8);border-radius:12px;box-shadow:0 0 0 9999px rgba(0,0,0,0.4)"></div>
      </div>
      <div id="qr-status" style="position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.6);color:white;text-align:center;padding:8px;font-size:13px">
        Apuntá la cámara al QR del bulto
      </div>
    </div>

  `;

  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
    .then(stream => {
      const video = document.getElementById('qr-video');
      if (!video) { stream.getTracks().forEach(t=>t.stop()); return; }
      video.srcObject = stream;
      video._stream = stream;
      scanQRLoop(ordenId);
    })
    .catch(err => {
      cont.innerHTML = `<div class="alert alert-danger">No se pudo acceder a la cámara: ${err.message}.<br>Usá el botón de escaneo manual en cada ítem.</div>`;
    });
}

function cerrarCamaraQR() {
  const video = document.getElementById('qr-video');
  if (video && video._stream) video._stream.getTracks().forEach(t=>t.stop());
  const cont = document.getElementById('qr-scanner-cont');
  if (cont) cont.innerHTML = `<button class="btn btn-primary" style="width:100%;justify-content:center;font-size:14px;padding:12px" onclick="abrirCamaraQR(window._qrOrdenId)">📷 Escanear QR con cámara</button>`;
}

let _qrScanActive = false;
function scanQRLoop(ordenId) {
  window._qrOrdenId = ordenId;
  _qrScanActive = true;

  function tick() {
    if (!_qrScanActive) return;
    if (!document.getElementById('overlay-modal-prep')) { _qrScanActive = false; return; }
    const video = document.getElementById('qr-video');
    const canvas = document.getElementById('qr-canvas');
    if (!video || !canvas || video.readyState !== video.HAVE_ENOUGH_DATA) { requestAnimationFrame(tick); return; }

    canvas.height = video.videoHeight;
    canvas.width = video.videoWidth;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

    // Use BarcodeDetector API if available (Chrome/Edge/Android)
    if (window.BarcodeDetector) {
      new BarcodeDetector({ formats: ['qr_code'] })
        .detect(canvas)
        .then(barcodes => {
          if (barcodes.length > 0) {
            _qrScanActive = false;
            const raw = barcodes[0].rawValue;
            procesarQREscaneado(ordenId, raw);
            // Brief pause then resume
            setTimeout(() => {
              _qrScanActive = true;
              requestAnimationFrame(tick);
            }, 2000);
          } else {
            requestAnimationFrame(tick);
          }
        })
        .catch(() => requestAnimationFrame(tick));
    } else {
      // BarcodeDetector not available — show message
      const status = document.getElementById('qr-status');
      if (status) status.textContent = 'Tu navegador no soporta escaneo automático. Usá Chrome en Android o los botones manuales.';
      _qrScanActive = false;
    }
  }
  requestAnimationFrame(tick);
}

function procesarQREscaneado(ordenId, raw) {
  let codigo = raw;
  try {
    const parsed = JSON.parse(raw);
    if (parsed.codigo) codigo = parsed.codigo;
  } catch(e) { /* raw string */ }
  procesarCodigoEscaneado(ordenId, codigo);
  const status = document.getElementById('qr-status');
  if (status) {
    status.textContent = '✓ QR leído: ' + codigo;
    status.style.background = 'rgba(22,163,74,0.8)';
    setTimeout(() => {
      if (status) { status.textContent = 'Apuntá la cámara al QR del bulto'; status.style.background = 'rgba(0,0,0,0.6)'; }
    }, 1800);
  }
}

function procesarCodigoEscaneado(ordenId, raw) {
  const o = DB.ordenes.find(x=>x.id===ordenId);
  if (!o) return;
  // Parse QR — JSON {codigo, variante, bulto} or plain string
  let codigoBuscado = raw, varianteBuscada = null;
  try {
    const parsed = JSON.parse(raw);
    if (parsed.codigo) { codigoBuscado = parsed.codigo; varianteBuscada = parsed.variante || null; }
  } catch(e) { /* plain string */ }

  // Match by codigo + variante (color) for exact item identification
  let idx = -1;
  if (varianteBuscada) {
    idx = o.items.findIndex(item =>
      item.codigo === codigoBuscado &&
      (item.color || '').toLowerCase() === varianteBuscada.toLowerCase()
    );
  }
  // Fallback: match only by codigo (backwards compat)
  if (idx === -1) idx = o.items.findIndex(item => item.codigo === codigoBuscado && !item.color);
  if (idx === -1) {
    showToast('⚠ Código no encontrado en esta orden: ' + codigoBuscado + (varianteBuscada ? ' / ' + varianteBuscada : ''));
    return;
  }

  const item = o.items[idx];
  const art = DB.articulos.find(a=>a.id===item.articuloId);
  const bulto = art?.unidadesBulto || 1;
  const actual = o.verificacion[idx] || 0;

  // Warn if scanning more than needed
  if (actual >= item.cant) {
    showToastWarn('⚠ ' + item.nombre + (item.color ? ' ' + item.color : '') + ': ya está completo. Hay bultos de más separados (' + (actual + bulto) + ' vs ' + item.cant + ' solicitados)');
    // Still register the excess so it's visible
    o.verificacion[idx] = actual + bulto;
    const totalUnidades = o.items.reduce((s,i)=>s+i.cant,0);
    const totalVerif = o.items.reduce((s,i,i2)=>s+(o.verificacion[i2]||0),0);
    o.progPreparacion = totalUnidades > 0 ? Math.round(totalVerif/totalUnidades*100) : 0;
    abrirPreparacion(ordenId);
    return;
  }

  escanearBulto(ordenId, idx, bulto);
  const nuevoTotal = o.verificacion[idx] || 0;
  const restante = item.cant - nuevoTotal;
  if (restante <= 0) {
    showToastOk('✅ ' + item.nombre + (item.color ? ' ' + item.color : '') + ' — ¡Completo!');
  } else {
    showToast('✓ ' + item.nombre + (item.color ? ' ' + item.color : '') + ' +' + bulto + ' u · Faltan ' + restante);
  }
}

function escanearBulto(ordenId, itemIdx, cantidad) {
  const o = DB.ordenes.find(x=>x.id===ordenId);
  if (!o || !o.verificacion) return;
  const item = o.items[itemIdx];
  const actual = o.verificacion[itemIdx] || 0;
  o.verificacion[itemIdx] = Math.min(item.cant, actual + cantidad);
  // Recalc progress
  const totalUnidades = o.items.reduce((s,i)=>s+i.cant,0);
  const totalVerif = o.items.reduce((s,i,idx)=>s+(o.verificacion[idx]||0),0);
  o.progPreparacion = totalUnidades > 0 ? Math.round(totalVerif/totalUnidades*100) : 0;
  // Refresh modal content
  abrirPreparacion(ordenId);
}

function deshacerVerif(ordenId, itemIdx) {
  const o = DB.ordenes.find(x=>x.id===ordenId);
  if (!o) return;
  o.verificacion[itemIdx] = 0;
  const totalUnidades = o.items.reduce((s,i)=>s+i.cant,0);
  const totalVerif = o.items.reduce((s,i,idx)=>s+(o.verificacion[idx]||0),0);
  o.progPreparacion = totalUnidades > 0 ? Math.round(totalVerif/totalUnidades*100) : 0;
  abrirPreparacion(ordenId);
}

function marcarOrdenPreparada(ordenId) {
  const o = DB.ordenes.find(x=>x.id===ordenId);
  if (!o) return;
  o.preparado = true;
  o.progPreparacion = 100;
  o.fechaPreparacion = todayDate();
  closeModal('modal-prep');
  if (activeModule === 'deposito') renderDeposito();
  else if (activeModule === 'ordenes') filtrarTablaOrdenes();
  showToast('✅ Pedido marcado como preparado');
}

function actualizarInfoSemi() {
  const prodId = parseInt(document.getElementById('semi-producto')?.value);

  const info = document.getElementById('semi-info');

  const stockActual = prod.cajas.reduce((s,c) => s+c.unidades, 0);
  info.style.display = 'block';
  info.innerHTML = `Stock actual: <strong>${stockActual.toLocaleString('es-AR')} unidades</strong> en <strong>${prod.cajas.length} cajas</strong> · Estándar: ${prod.unidadesCaja} u/caja`;
  calcSemiUnidades();
}

function calcSemiUnidades() {
  const prodId = parseInt(document.getElementById('semi-producto')?.value);
  const prod = DB.fabrica.semiElaborados.find(p => p.id === prodId);
  const cant = parseInt(document.getElementById('semi-cant-cajas')?.value) || 0;
  const el = document.getElementById('semi-unidades-calc');
  if (el && prod) el.textContent = (cant * prod.unidadesCaja).toLocaleString('es-AR') + ' u';
}

function guardarCargaSemi() {
  const prodId = parseInt(document.getElementById('semi-producto')?.value);
  const prod = DB.fabrica.semiElaborados.find(p => p.id === prodId);
  if (!prod) return;
  const cantCajas = parseInt(document.getElementById('semi-cant-cajas')?.value) || 0;
  if (cantCajas <= 0) { alert('Ingresá cantidad de cajas'); return; }
  const unidadesReal = parseInt(document.getElementById('semi-unidades-real')?.value);
  const unidades = unidadesReal > 0 ? unidadesReal : cantCajas * prod.unidadesCaja;
  const lote = {
    id: Date.now().toString(),
    fecha: document.getElementById('semi-fecha').value,
    cantCajas,
    unidades,
    obs: document.getElementById('semi-obs').value,
    usuario: currentUser.name
  };
  prod.cajas.push(lote);
  closeModal('modal-carga-semi');
  switchFabricaTab('semi', null);
  showToast(`✓ ${cantCajas} caja${cantCajas!==1?'s':''} registrada${cantCajas!==1?'s':''} — ${unidades.toLocaleString('es-AR')} unidades`);
}

  prod.cajas = prod.cajas.filter(c => c.id !== loteId);

function guardarAjusteInsumo() {
  const insId = parseInt(document.getElementById('aj-insumo')?.value);
  const ins = DB.fabrica.insumos.find(x => x.id === insId);
  if (!ins) return;
  const tipo = document.getElementById('aj-tipo').value;
  const cant = parseInt(document.getElementById('aj-cant').value) || 0;
  if (cant <= 0) { alert('Ingresá una cantidad mayor a 0'); return; }
  const obs = document.getElementById('aj-obs').value;
  if (tipo === 'entrada') ins.stock += cant;
  else if (tipo === 'salida') ins.stock -= cant;
  else ins.stock = cant; // ajuste directo
  if (!ins.movimientos) ins.movimientos = [];
  ins.movimientos.push({ fecha: todayDate(), tipo, cant, obs, usuario: currentUser.name });
  closeModal('modal-ajuste-ins');
  switchFabricaTab('insumos', null);
  showToast(`Stock de ${ins.nombre} actualizado: ${ins.stock} ${ins.unidad}`);
}

function emitirRemitoTransito() {
  const tallerSel = document.getElementById('rt-taller')?.value;
  let destino = '', direccion2 = '';
  if (tallerSel && tallerSel !== 'manual' && tallerSel !== '') {
    const taller = DB.fabrica.talleres.find(t => t.id == tallerSel);
    destino = taller?.nombre || '';
    direccion2 = taller?.direccion || '';
  } else {
    destino = document.getElementById('rt-destino')?.value.trim() || '';
  }
  if (!destino) { alert('Seleccioná o ingresá el destino'); return; }
  const rows = document.querySelectorAll('#rt-items tr');
  if (!rows.length) { alert('Agregá al menos un ítem'); return; }

  const items = [];
  let valid = true;
  rows.forEach(tr => {
    const idx = tr.id.replace('rt-row-','');
    const ref = tr.dataset.ref;
    const nombreEl = document.getElementById('rt-nombre-'+idx);
    const nombre = nombreEl ? nombreEl.value.trim() : tr.querySelector('span')?.textContent?.trim() || '';
    const det = document.getElementById('rt-det-'+idx)?.value || '';
    const cant = parseInt(document.getElementById('rt-cant-'+idx)?.value) || 0;
    if (!nombre || cant <= 0) { valid = false; return; }
    const fab = DB.fabrica;
    let unidad = 'unidad';
    if (ref.startsWith('semi-')) {
      const p = fab.semiElaborados.find(x => x.id === parseInt(ref.replace('semi-','')));
      if (p) unidad = 'unidades';
    } else if (ref.startsWith('ins-')) {
      const ins = fab.insumos.find(x => x.id === parseInt(ref.replace('ins-','')));
      if (ins) unidad = ins.unidad;
    }
    items.push({ ref, nombre, detalle: det, cant, unidad });
  });

  if (!valid) { alert('Completá nombre y cantidad de todos los ítems'); return; }

  // Descontar stock
  const fab = DB.fabrica;
  items.forEach(item => {
    if (item.ref.startsWith('semi-')) {
      const p = fab.semiElaborados.find(x => x.id === parseInt(item.ref.replace('semi-','')));
      if (!p) return;
      let resta = item.cant;
      // Descontar de cajas FIFO
      for (let i = 0; i < p.cajas.length && resta > 0; i++) {
        if (p.cajas[i].unidades <= resta) {
          resta -= p.cajas[i].unidades;
          p.cajas[i].unidades = 0;
        } else {
          p.cajas[i].unidades -= resta;
          resta = 0;
        }
      }
      p.cajas = p.cajas.filter(c => c.unidades > 0);
    } else if (item.ref.startsWith('ins-')) {
      const ins = fab.insumos.find(x => x.id === parseInt(item.ref.replace('ins-','')));
      if (ins) ins.stock -= item.cant;
    }
  });

  const remito = {
    id: Date.now(),
    numero: fab.nextRemito++,
    fecha: document.getElementById('rt-fecha').value,
    destino,
    direccion: direccion2 || document.getElementById('rt-direccion')?.value || '',
    items,
    obs: document.getElementById('rt-obs')?.value || '',
    emisor: currentUser.name,
    estado: 'emitido'
  };
  fab.remitos.push(remito);
  closeModal('modal-remito-transito');
  imprimirRemitoTransito(remito.id);
  renderFabricaRemitos(document.getElementById('fabrica-tab-content'));
  showToast('Remito emitido y stock descontado');
}

      <button class="btn btn-secondary" onclick="closeModal('modal-ver-rt')">Cerrar</button>
      <button class="btn btn-primary" onclick="closeModal('modal-ver-rt');imprimirRemitoTransito(${r.id})">🖨 Imprimir / PDF</button>
    </div>
  `, 'modal-lg');
}

function imprimirRemitoTransito(id) {
  const r = DB.fabrica.remitos.find(x => x.id === id);
  if (!r) return;
  const cfg = DB.config;

  const paginaHtml = (copy) => `
    <div style="width:19cm;margin:0 auto;padding:1cm;font-family:Arial,sans-serif;font-size:12px;border:1px solid #ccc;page-break-after:always">
      <div style="text-align:center;font-weight:700;font-size:13px;background:#f3eff8;padding:5px;border-radius:4px;margin-bottom:14px;color:#5B1A8A;letter-spacing:1px">
        REMITO DE MERCADERÍA EN TRÁNSITO — ${copy}
      </div>
      <div style="display:flex;justify-content:space-between;border-bottom:2px solid #5B1A8A;padding-bottom:12px;margin-bottom:12px">
        <div>
          <div style="font-size:18px;font-weight:700;color:#5B1A8A">${cfg.empresa}</div>
          <div>CUIT: ${cfg.cuit} · ${cfg.direccion}</div>
          <div>Tel: ${cfg.telefono}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:20px;font-weight:700">N° ${String(r.numero).padStart(6,'0')}</div>
          <div>Fecha: ${fmtFecha(r.fecha)}</div>
          <div style="font-size:11px;color:#666">Emitido por: ${r.emisor}</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;border:1px solid #ccc;padding:10px;border-radius:4px;margin-bottom:14px">
        <div><strong>DESTINO:</strong> ${r.destino}<br><strong>Dirección:</strong> ${r.direccion||'—'}</div>
        <div><strong>Tipo de operación:</strong> Envío a taller para ensamblaje<br><strong>Estado:</strong> En tránsito</div>
      </div>
      <table style="width:100%;border-collapse:collapse;margin-bottom:14px">
        <thead><tr style="background:#5B1A8A;color:white">
          <th style="padding:8px;text-align:left">Descripción</th>
          <th style="padding:8px;text-align:left">Detalle</th>
          <th style="padding:8px;text-align:right">Cantidad</th>
          <th style="padding:8px;text-align:left">Unidad</th>
        </tr></thead>
        <tbody>${r.items.map((item,i) => `<tr style="background:${i%2?'#f9f9f9':'white'}">
          <td style="border:1px solid #ddd;padding:7px 8px;font-weight:600">${item.nombre}</td>
          <td style="border:1px solid #ddd;padding:7px 8px;color:#555">${item.detalle||'—'}</td>
          <td style="border:1px solid #ddd;padding:7px 8px;text-align:right;font-size:15px;font-weight:700">${item.cant.toLocaleString('es-AR')}</td>
          <td style="border:1px solid #ddd;padding:7px 8px;color:#666">${item.unidad}</td>
        </tr>`).join('')}</tbody>
      </table>
      ${r.obs ? `<div style="border:1px solid #ccc;padding:10px;border-radius:4px;margin-bottom:14px;font-size:12px"><strong>Observaciones:</strong> ${r.obs}</div>` : ''}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-top:50px">
        <div style="border-top:1px solid #333;padding-top:6px;text-align:center;font-size:11px;color:#555">Firma y aclaración — Remitente</div>
        <div style="border-top:1px solid #333;padding-top:6px;text-align:center;font-size:11px;color:#555">Firma y aclaración — Receptor (taller)</div>
      </div>
    </div>
  `;

  const contenido = `<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>Remito Tránsito #${r.numero}</title>
    <style>body{margin:0;padding:20px;background:#f5f5f5} @media print{body{background:white;padding:0} .no-print{display:none}}</style>
  </head><body>
    <div class="no-print" style="text-align:center;margin-bottom:16px">
      <button onclick="window.print()" style="background:#5B1A8A;color:white;border:none;padding:10px 24px;border-radius:6px;font-size:14px;cursor:pointer;font-weight:600">🖨 Imprimir / Guardar PDF</button>
    </div>
    ${paginaHtml('ORIGINAL')}
    <div style="border-top:2px dashed #999;margin:16px 0"></div>
    ${paginaHtml('DUPLICADO')}
  </body></html>`;

  const blob = new Blob([contenido], { type: 'text/html;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'remito-transito-' + String(r.numero).padStart(4,'0') + '.html';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  showToast('PDF listo — abrí el archivo e imprimí');
}

function badgeEstadoOrden(estado, preparado) {
  let badge = '';
  if (estado==='pendiente') badge = `<span class="badge badge-amber">Pendiente</span>`;
  else if (estado==='facturado') badge = `<span class="badge badge-green">Facturado</span>`;
  else badge = `<span class="badge badge-gray">${estado}</span>`;
  if (preparado) badge += ` <span class="badge badge-green" style="background:#dcfce7;color:#14532d">✓ Preparado</span>`;
  return badge;
}

// Modal helpers
function showModal(id, html, extraClass) {
  closeModal(id);
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'overlay-'+id;
  overlay.innerHTML = `<div class="modal ${extraClass||''}">${html}</div>`;
  overlay.addEventListener('click', e => { if(e.target===overlay) closeModal(id); });
  document.body.appendChild(overlay);
}
function closeModal(id) {
  const el = document.getElementById('overlay-'+id);
  if (el) el.remove();
}

// Toast
function showToast(msg, color, duration) {
  // Remove existing toasts
  document.querySelectorAll('.sys-toast').forEach(t => t.remove());
  const t = document.createElement('div');
  t.className = 'sys-toast';
  t.style.cssText='position:fixed;bottom:88px;right:16px;left:16px;max-width:420px;margin:0 auto;padding:14px 18px;border-radius:12px;font-size:14px;font-weight:500;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,0.25);animation:fadeIn 0.2s ease;background:'+(color||'#1A1916')+';color:#fff';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), duration||3000);
}
function showToastOk(msg)   { showToast(msg, '#16A34A', 3000); }
function showToastWarn(msg) { showToast(msg, '#D97706', 5000); }
function showToastErr(msg)  { showToast(msg, '#DC2626', 5000); }
</script>

<style>
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
</style>
