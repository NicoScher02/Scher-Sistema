<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scher — Sistema de Gestión</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #FAF8FC;
    --surface: #FFFFFF;
    --surface2: #F3EFF8;
    --border: #E8E0F0;
    --border2: #D4C8E8;
    --text: #1A1220;
    --text2: #6B5F7A;
    --text3: #A898BA;
    --accent: #5B1A8A;
    --accent-light: #F3EFF8;
    --accent-text: #5B1A8A;
    --pink: #E060A0;
    --pink-light: #FDE8F4;
    --pink-text: #8B1A5A;
    --green: #16A34A;
    --green-light: #F0FDF4;
    --green-text: #14532D;
    --red: #DC2626;
    --red-light: #FEF2F2;
    --red-text: #7F1D1D;
    --amber: #D97706;
    --amber-light: #FFFBEB;
    --amber-text: #78350F;
    --purple: #5B1A8A;
    --purple-light: #F3EFF8;
    --purple-text: #3D0F61;
    --radius: 10px;
    --radius-sm: 6px;
    --shadow: 0 1px 3px rgba(91,26,138,0.08), 0 1px 2px rgba(91,26,138,0.06);
    --shadow-lg: 0 10px 25px rgba(91,26,138,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }
  
  /* Layout */
  #app { display: flex; height: 100vh; overflow: hidden; }
  #sidebar { width: 240px; background: #FDFAFF; border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  #content { flex: 1; overflow-y: auto; padding: 24px; }

  /* Sidebar */
  .sidebar-logo { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; }
  .sidebar-logo img { width: 110px; height: auto; display: block; }
  .sidebar-logo p { font-size: 11px; color: var(--text3); margin-top: 6px; }
  .sidebar-nav { flex: 1; overflow-y: auto; padding: 12px 8px; }
  .nav-section { margin-bottom: 20px; }
  .nav-section-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text3); padding: 0 12px; margin-bottom: 4px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: var(--radius-sm); cursor: pointer; color: var(--text2); font-size: 13px; font-weight: 500; transition: all 0.15s; margin-bottom: 2px; }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--purple-light); color: var(--purple); font-weight: 600; }
  .nav-icon { width: 18px; height: 18px; opacity: 0.7; flex-shrink: 0; }
  .nav-item.active .nav-icon { opacity: 1; }
  .sidebar-user { padding: 16px; border-top: 1px solid var(--border); }
  .user-pill { display: flex; align-items: center; gap: 10px; }
  .user-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--pink-light); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: var(--pink-text); flex-shrink: 0; }
  .user-info { flex: 1; min-width: 0; }
  .user-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-role { font-size: 11px; color: var(--text3); }
  .logout-btn { background: none; border: none; cursor: pointer; color: var(--text3); padding: 4px; border-radius: 4px; }
  .logout-btn:hover { color: var(--red); }

  /* Topbar */
  .page-title { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; }
  .topbar-actions { display: flex; gap: 8px; align-items: center; }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; border: 1px solid transparent; font-family: inherit; }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: #4A1570; }
  .btn-secondary { background: var(--surface); color: var(--text); border-color: var(--border2); }
  .btn-secondary:hover { background: var(--surface2); }
  .btn-danger { background: var(--red-light); color: var(--red); border-color: transparent; }
  .btn-danger:hover { background: #FEE2E2; }
  .btn-success { background: var(--green); color: #fff; }
  .btn-success:hover { background: #15803D; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-icon { padding: 7px; }

  /* Cards */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .card-title { font-size: 14px; font-weight: 600; }

  /* Stat cards */
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; }
  .stat-label { font-size: 11px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .stat-value { font-size: 26px; font-weight: 600; letter-spacing: -0.5px; }
  .stat-sub { font-size: 12px; color: var(--text3); margin-top: 4px; }

  /* Tables */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead tr { border-bottom: 1px solid var(--border); }
  th { text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text3); padding: 10px 12px; }
  td { padding: 11px 12px; font-size: 13px; border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  tbody tr { transition: background 0.1s; }
  tbody tr:hover { background: var(--surface2); }
  .clickable { cursor: pointer; }

  /* Badges */
  .badge { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-green { background: var(--green-light); color: var(--green-text); }
  .badge-red { background: var(--red-light); color: var(--red); }
  .badge-amber { background: var(--amber-light); color: var(--amber-text); }
  .badge-blue { background: var(--accent-light); color: var(--accent-text); }
  .badge-purple { background: var(--purple-light); color: var(--purple-text); }
  .badge-gray { background: var(--surface2); color: var(--text2); }

  /* Forms */
  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.4px; }
  input, select, textarea { width: 100%; padding: 9px 12px; border: 1px solid var(--border2); border-radius: var(--radius-sm); font-family: inherit; font-size: 13px; color: var(--text); background: var(--surface); transition: border-color 0.15s; outline: none; }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
  textarea { resize: vertical; min-height: 80px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .modal { background: var(--surface); border-radius: 14px; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lg); }
  .modal-lg { max-width: 800px; }
  .modal-xl { max-width: 960px; }
  .modal-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--surface); }
  .modal-title { font-size: 15px; font-weight: 600; }
  .modal-body { padding: 20px 24px; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }
  .close-btn { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 20px; line-height: 1; padding: 2px; border-radius: 4px; }
  .close-btn:hover { color: var(--text); background: var(--surface2); }

  /* Login */
  #login-screen { position: fixed; inset: 0; background: linear-gradient(135deg, #FAF8FC 0%, #F3EFF8 50%, #FDE8F4 100%); display: flex; align-items: center; justify-content: center; z-index: 2000; }
  .login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px; width: 380px; box-shadow: 0 8px 32px rgba(91,26,138,0.12); }
  .login-logo { text-align: center; margin-bottom: 32px; }
  .login-logo h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .login-logo p { color: var(--text3); font-size: 13px; margin-top: 4px; }
  .login-error { background: var(--red-light); color: var(--red); padding: 10px 14px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 16px; display: none; }

  /* Inline items (order lines) */
  .items-table { width: 100%; margin-bottom: 12px; }
  .items-table th { background: var(--surface2); }
  .items-table input, .items-table select { border-radius: 4px; padding: 6px 8px; }
  .remove-row { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 16px; padding: 4px; }
  .remove-row:hover { color: var(--red); }

  /* Remito print */
  @media print {
    body { background: white; }
    #app { display: none; }
    #print-area { display: block !important; }
  }
  #print-area { display: none; }
  .remito-page { width: 21cm; margin: 0 auto; padding: 1cm; background: white; font-family: 'DM Mono', monospace; font-size: 12px; }
  .remito-header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 2px solid #000; padding-bottom: 12px; margin-bottom: 12px; }
  .remito-empresa h2 { font-size: 18px; font-weight: 700; }
  .remito-num { text-align: right; }
  .remito-num h3 { font-size: 20px; font-weight: 700; }
  .remito-datos { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 12px; border: 1px solid #000; padding: 10px; }
  .remito-table { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
  .remito-table th, .remito-table td { border: 1px solid #000; padding: 6px 8px; }
  .remito-table th { background: #eee; font-weight: 700; }
  .remito-totales { text-align: right; font-size: 13px; }
  .remito-totales .total-final { font-size: 16px; font-weight: 700; border-top: 2px solid #000; padding-top: 6px; }
  .remito-firmas { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-top: 40px; }
  .firma-line { border-top: 1px solid #000; padding-top: 4px; text-align: center; font-size: 11px; }
  .remito-copy-label { text-align: center; font-size: 14px; font-weight: 700; background: #ddd; padding: 4px; margin-bottom: 12px; }
  .page-break { page-break-after: always; border-top: 2px dashed #999; margin: 20px 0; }

  /* Alert */
  .alert { padding: 12px 16px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 16px; }
  .alert-info { background: var(--accent-light); color: var(--accent-text); }
  .alert-success { background: var(--green-light); color: var(--green-text); }
  .alert-danger { background: var(--red-light); color: var(--red); }

  /* Section header */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .section-title { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }

  /* Empty state */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text3); }
  .empty-state p { font-size: 13px; margin-top: 8px; }

  /* Search */
  .search-bar { position: relative; }
  .search-bar input { padding-left: 36px; }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 14px; }

  /* Color swatch */
  .color-swatch { display: inline-block; width: 14px; height: 14px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.2); vertical-align: middle; margin-right: 4px; }

  /* Totals box */
  .totals-box { background: var(--surface2); border-radius: var(--radius-sm); padding: 16px; }
  .total-row { display: flex; justify-content: space-between; font-size: 13px; padding: 3px 0; }
  .total-row.grand { font-size: 16px; font-weight: 700; border-top: 1px solid var(--border2); margin-top: 8px; padding-top: 8px; }

  /* Tab nav */
  .tab-nav { display: flex; gap: 2px; background: var(--surface2); padding: 4px; border-radius: var(--radius-sm); margin-bottom: 20px; width: fit-content; }
  .tab-btn { padding: 7px 16px; border-radius: 6px; border: none; background: none; cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 500; color: var(--text2); transition: all 0.15s; }
  .tab-btn.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow); }

  /* Movimiento positivo/negativo */
  .mov-pos { color: var(--green); }
  .mov-neg { color: var(--red); }
  
  input[type=number] { -moz-appearance: textfield; }
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }

  /* ── RESPONSIVE ──────────────────────────────────────────────────── */

  /* Hamburger button — hidden on desktop */
  #menu-toggle {
    display: none; background: none; border: none; cursor: pointer;
    padding: 6px; border-radius: var(--radius-sm); color: var(--text);
    font-size: 22px; line-height: 1; margin-right: 8px;
  }

  /* Sidebar overlay — mobile only */
  #sidebar-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.4); z-index: 199;
  }

  /* Bottom nav — mobile only */
  #bottom-nav {
    display: none; position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface); border-top: 1px solid var(--border);
    z-index: 150; padding: 6px 0 max(6px, env(safe-area-inset-bottom));
    grid-template-columns: repeat(5, 1fr);
  }
  .bnav-item {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    padding: 6px 4px; cursor: pointer; color: var(--text3);
    font-size: 10px; font-weight: 500; border: none; background: none;
    transition: color 0.15s;
  }
  .bnav-item.active { color: var(--accent); }
  .bnav-item span:first-child { font-size: 20px; line-height: 1; }

  /* TABLET — 768px to 1024px */
  @media (max-width: 1024px) {
    #sidebar { width: 200px; }
    #content { padding: 16px; }
    .stat-grid { grid-template-columns: repeat(2, 1fr); }
    .form-row { grid-template-columns: 1fr 1fr; }
  }

  /* MOBILE — up to 767px */
  @media (max-width: 767px) {
    /* Show hamburger, hide sidebar by default */
    #menu-toggle { display: block; }

    #sidebar {
      position: fixed; left: -260px; top: 0; bottom: 0;
      width: 260px; z-index: 200;
      transition: left 0.25s cubic-bezier(0.4,0,0.2,1);
      box-shadow: none;
    }
    #sidebar.open {
      left: 0;
      box-shadow: 4px 0 24px rgba(0,0,0,0.18);
    }
    #sidebar-overlay.open { display: block; }

    /* Hide desktop topbar title on mobile, use bottom nav */
    #bottom-nav { display: grid; }
    #content { padding: 12px 12px 80px; }
    #topbar { padding: 0 12px; }

    /* Modals full screen on mobile */
    .modal-overlay { padding: 0; align-items: flex-end; }
    .modal, .modal-lg, .modal-xl {
      max-width: 100%; width: 100%; max-height: 95vh;
      border-radius: 20px 20px 0 0;
    }
    .modal-body { padding: 16px; }
    .modal-header { padding: 16px 16px 12px; }
    .modal-footer { padding: 12px 16px; }

    /* Stack form rows on mobile */
    .form-row, .form-row-3 { grid-template-columns: 1fr; gap: 0; }

    /* Stat grid 2 cols on mobile */
    .stat-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 16px; }
    .stat-value { font-size: 20px; }

    /* Tables: allow horizontal scroll */
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    td, th { padding: 9px 8px; font-size: 12px; white-space: nowrap; }

    /* Buttons larger touch targets */
    .btn { padding: 10px 14px; min-height: 42px; }
    .btn-sm { padding: 8px 10px; min-height: 36px; font-size: 12px; }

    /* Login box full width */
    .login-box { width: calc(100% - 32px); padding: 28px 20px; }

    /* Cards less padding */
    .card { padding: 14px; }
    .card-header { flex-direction: column; align-items: flex-start; gap: 10px; }

    /* Tab nav scrollable */
    .tab-nav { overflow-x: auto; white-space: nowrap; width: 100%; -webkit-overflow-scrolling: touch; }

    /* Section header stack */
    .section-header { flex-direction: column; align-items: flex-start; gap: 10px; }

    /* Topbar actions wrap */
    .topbar-actions { flex-wrap: wrap; gap: 6px; }

    /* Preparacion items — larger buttons for touch */
    #prep-items-cont .btn { font-size: 15px; min-height: 48px; }

    /* Fab quick load — big number inputs */
    #semi-cant-cajas { font-size: 28px !important; text-align: center; padding: 12px; }
  }

  /* SMALL MOBILE — up to 400px */
  @media (max-width: 400px) {
    .stat-grid { grid-template-columns: 1fr 1fr; gap: 6px; }
    .stat-value { font-size: 18px; }
    #content { padding: 10px 10px 80px; }
  }

</style>
</head>

// ── RESPONSIVE / DEVICE DETECTION ──────────────────────────────────────────
function isMobile() { return window.innerWidth <= 767; }
function isTablet() { return window.innerWidth > 767 && window.innerWidth <= 1024; }

function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  const isOpen = sidebar.classList.contains('open');
  if (isOpen) closeSidebar();
  else { sidebar.classList.add('open'); overlay.classList.add('open'); }
}

function closeSidebar() {
  document.getElementById('sidebar')?.classList.remove('open');
  document.getElementById('sidebar-overlay')?.classList.remove('open');
}

// Bottom nav items for mobile (most used modules)
const BOTTOM_NAV = [
  { id:'dashboard', icon:'📊', label:'Inicio' },
  { id:'ordenes',   icon:'📋', label:'Órdenes' },
  { id:'clientes',  icon:'👥', label:'Clientes' },
  { id:'deposito',  icon:'✅', label:'Depósito' },
  { id:'pagos',     icon:'💳', label:'Pagos' },
];

// Bottom nav for fabrica role
const BOTTOM_NAV_FABRICA = [
  { id:'fabrica', icon:'🏭', label:'Fábrica' },
];

function buildBottomNav() {
  const nav = document.getElementById('bottom-nav');
  if (!nav) return;
  const items = currentUser?.role === 'fabrica' ? BOTTOM_NAV_FABRICA
    : BOTTOM_NAV.filter(item => {
        const navItem = NAV_ITEMS.find(n => n.id === item.id);
        return navItem && navItem.roles.includes(currentUser?.role);
      });
  nav.innerHTML = items.map(item => `
    <button class="bnav-item ${activeModule===item.id?'active':''}" id="bnav-${item.id}" onclick="navigate('${item.id}')">
      <span>${item.icon}</span>
      <span>${item.label}</span>
    </button>
  `).join('');
  // Adjust columns to actual item count
  nav.style.gridTemplateColumns = `repeat(${items.length}, 1fr)`;
}

function updateBottomNav() {
  document.querySelectorAll('.bnav-item').forEach(b => b.classList.remove('active'));
  const active = document.getElementById('bnav-' + activeModule);
  if (active) active.classList.add('active');
}

// Close sidebar and update bottom nav on navigate (mobile)
// Patched after navigate is defined — see _navigateWithResponsive below

// Handle resize — rebuild nav on orientation change
window.addEventListener('resize', () => {
  buildBottomNav();
  // On desktop, ensure sidebar is always visible (remove mobile classes)
  if (!isMobile()) {
    document.getElementById('sidebar')?.classList.remove('open');
    document.getElementById('sidebar-overlay')?.classList.remove('open');
  }
});

// Swipe to open/close sidebar on mobile
(function() {
  let touchStartX = 0;
  let touchStartY = 0;
  document.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });
  document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = Math.abs(e.changedTouches[0].clientY - touchStartY);
    if (dy > 60) return; // mostly vertical swipe — ignore
    const sidebar = document.getElementById('sidebar');
    if (dx > 60 && touchStartX < 30 && !sidebar?.classList.contains('open')) {
      toggleSidebar(); // swipe right from edge → open
    } else if (dx < -60 && sidebar?.classList.contains('open')) {
      closeSidebar(); // swipe left → close
    }
  }, { passive: true });
})();

function doLogin() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value;
  const user = DB.users.find(x => x.username === u && x.password === p);
  if (!user) { document.getElementById('login-error').style.display='block'; return; }
  currentUser = user;
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('user-avatar').textContent = user.initials;
  document.getElementById('user-name-display').textContent = user.name;
  document.getElementById('user-role-display').textContent = roleLabel(user.role);
  buildNav();
  buildBottomNav();
  navigate('dashboard');
}

function doLogout() {
  currentUser = null;
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('login-error').style.display='none';
  document.getElementById('login-user').value='';
  document.getElementById('login-pass').value='';
}

function roleLabel(r) { return {admin:'Administrador', interno:'Vendedor Interno', externo:'Vendedor Externo', fabrica:'Personal Fábrica'}[r] || r; }

function can(action) {
  const r = currentUser.role;
  const perms = {
    admin: ['dashboard','ordenes','clientes','articulos','tesoreria','reportes','usuarios','config'],
    interno: ['dashboard','ordenes','clientes','articulos','tesoreria_basico'],
    externo: ['dashboard','ordenes','clientes_propios']
  };
  return (perms[r] || []).includes(action);
}

  { id:'config', label:'Configuración', icon:'⚙️', section:'Config', roles:['admin'] },
];

function buildNav() {
  const nav = document.getElementById('sidebar-nav');
  const visible = NAV_ITEMS.filter(n => n.roles.includes(currentUser.role));
  const sections = [...new Set(visible.map(n=>n.section))];
  nav.innerHTML = sections.map(sec => `
    <div class="nav-section">
      <div class="nav-section-label">${sec}</div>
      ${visible.filter(n=>n.section===sec).map(n=>`
        <div class="nav-item" id="nav-${n.id}" onclick="navigate('${n.id}')">
          <span>${n.icon}</span><span>${n.label}</span>
        </div>
      `).join('')}
    </div>
  `).join('');
}

function navigate(module) {
  activeModule = module;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('nav-'+module);
  if (el) el.classList.add('active');
  const titles = {dashboard:'Dashboard',ordenes:'Órdenes de Venta',clientes:'Clientes',articulos:'Artículos y Stock',deposito:'Preparación de Pedidos',fabrica:'Depósito Fábrica',tesoreria:'Tesorería / Cajas',pagos:'Pagos',reportes:'Reportes',usuarios:'Usuarios',config:'Configuración'};
  document.getElementById('page-title').textContent = titles[module] || module;
  document.getElementById('topbar-actions').innerHTML = '';
  const renders = {dashboard:renderDashboard,ordenes:renderOrdenes,clientes:renderClientes,articulos:renderArticulos,deposito:renderDeposito,fabrica:renderFabrica,tesoreria:renderTesoreria,pagos:renderPagos,reportes:renderReportes,usuarios:renderUsuarios,config:renderConfig};
  if (renders[module]) renders[module]();
  else document.getElementById('content').innerHTML = '<div class="empty-state">Módulo en construcción</div>';
  // Responsive: close sidebar on mobile, update bottom nav
  if (typeof isMobile === 'function' && isMobile()) closeSidebar();
  if (typeof buildBottomNav === 'function') { buildBottomNav(); updateBottomNav(); }
}

// ===================== DASHBOARD =====================
function renderDashboard() {
  // Redirect fabrica users straight to their module
  if (currentUser.role === 'fabrica') { navigate('fabrica'); return; }
  const hoy = new Date();
  const mesActual = hoy.getMonth();
  const anioActual = hoy.getFullYear();
  const ticketsDelMes = DB.tickets.filter(t => {
    const d = new Date(t.fecha);
    return d.getMonth()===mesActual && d.getFullYear()===anioActual;
  });
  const ventasMes = ticketsDelMes.reduce((s,t)=>s+t.total,0);
  const ordenesPend = DB.ordenes.filter(o=>o.estado==='pendiente').length;
  const clientesTotal = DB.clientes.length;
  const cajaTotal = DB.cajas.reduce((s,c)=>s+c.saldo,0);

  document.getElementById('content').innerHTML = `
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">Ventas del mes</div>
        <div class="stat-value">${fmtMoney(ventasMes)}</div>
        <div class="stat-sub">${ticketsDelMes.length} tickets emitidos</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Órdenes pendientes</div>
        <div class="stat-value">${ordenesPend}</div>
        <div class="stat-sub">sin ticket emitido</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Clientes activos</div>
        <div class="stat-value">${clientesTotal}</div>
        <div class="stat-sub">en base de datos</div>
      </div>
      ${currentUser.role==='admin' ? `
      <div class="stat-card">
        <div class="stat-label">Saldo total cajas</div>
        <div class="stat-value">${fmtMoney(cajaTotal)}</div>
        <div class="stat-sub">${DB.cajas.length} cajas activas</div>
      </div>` : ''}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
      <div class="card">
        <div class="card-header"><span class="card-title">Últimas órdenes</span></div>
        ${renderMiniOrdenes()}
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">Últimos pagos</span></div>
        ${renderMiniPagos()}
      </div>
    </div>
  `;
}

function renderMiniOrdenes() {
  const lista = [...DB.ordenes].reverse().slice(0,5);
  if (!lista.length) return '<div class="empty-state" style="padding:20px">Sin órdenes</div>';
  return `<div class="table-wrap"><table>
    <thead><tr><th>N°</th><th>Cliente</th><th>Total</th><th>Estado</th></tr></thead>
    <tbody>${lista.map(o=>`<tr>
      <td><span style="font-family:monospace;font-size:12px">#${String(o.numero).padStart(4,'0')}</span></td>
      <td>${getCliente(o.clienteId)?.nombre||'-'}</td>
      <td>${fmtMoney(o.total)}</td>
      <td>${badgeEstadoOrden(o.estado)}</td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

function renderMiniPagos() {
  const lista = [...DB.pagos].reverse().slice(0,5);
  if (!lista.length) return '<div class="empty-state" style="padding:20px">Sin pagos</div>';
  return `<div class="table-wrap"><table>
    <thead><tr><th>Cliente</th><th>Monto</th><th>Forma</th></tr></thead>
    <tbody>${lista.map(p=>`<tr>
      <td>${getCliente(p.clienteId)?.nombre||'-'}</td>
      <td class="mov-pos">${fmtMoney(p.monto)}</td>
      <td>${p.formaPago}</td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

// ===================== ÓRDENES =====================
function getOrdenesVisibles() {
  if (currentUser.role === 'externo') {
    const misClientes = DB.clientesVendedor[currentUser.id] || [];
    return DB.ordenes.filter(o => o.vendedorId===currentUser.id || misClientes.includes(o.clienteId));
  }
  return DB.ordenes;
}

function renderOrdenes() {
  const topbar = document.getElementById('topbar-actions');
  topbar.innerHTML = `<button class="btn btn-primary" onclick="abrirNuevaOrden()">+ Nueva orden</button>`;
  
  const ordenes = getOrdenesVisibles();
  let html = `
    <div class="section-header">
      <div style="display:flex;gap:8px">
        <select id="filtro-estado-orden" onchange="renderOrdenes()" style="width:auto">
          <option value="">Todos los estados</option>
          <option value="pendiente">Pendientes</option>
          <option value="facturado">Facturados</option>
        </select>
      </div>
    </div>
    <div class="card" style="padding:0">
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>N° Orden</th><th>Fecha</th><th>Cliente</th><th>Vendedor</th>
            <th>Total</th><th>Estado</th><th>Acciones</th>
          </tr></thead>
          <tbody id="tabla-ordenes"></tbody>
        </table>
      </div>
    </div>
  `;
  document.getElementById('content').innerHTML = html;
  filtrarTablaOrdenes();
}

function filtrarTablaOrdenes() {
  const filtroEstado = document.getElementById('filtro-estado-orden')?.value || '';
  let lista = getOrdenesVisibles();
  if (filtroEstado) lista = lista.filter(o=>o.estado===filtroEstado);
  lista = [...lista].reverse();
  
  const tbody = document.getElementById('tabla-ordenes');
  if (!tbody) return;
  if (!lista.length) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--text3);padding:40px">Sin órdenes</td></tr>';
    return;
  }
  tbody.innerHTML = lista.map(o => `
    <tr class="clickable" onclick="verOrden(${o.id})">
      <td><span style="font-family:monospace;font-size:12px;font-weight:600">#${String(o.numero).padStart(4,'0')}</span></td>
      <td>${fmtFecha(o.fecha)}</td>
      <td>${getCliente(o.clienteId)?.nombre||'-'}</td>
      <td>${getUser(o.vendedorId)?.name||'-'}</td>
      <td style="font-weight:600">${fmtMoney(o.total)}</td>
      <td>${badgeEstadoOrden(o.estado, o.preparado)}</td>
      <td onclick="event.stopPropagation()" style="display:flex;gap:4px;flex-wrap:wrap;align-items:center">
        <button class="btn btn-sm ${o.preparado?'btn-secondary':'btn-success'}" onclick="abrirPreparacion(${o.id})" title="${o.preparado?'Ver preparación':'Preparar pedido'}">
          ${o.preparado?'✓ Preparado':'📦 Preparar'}
        </button>
        ${o.estado==='pendiente' ? `<button class="btn btn-sm btn-primary" onclick="emitirTicket(${o.id})">Emitir ticket</button>` : `<button class="btn btn-sm btn-secondary" onclick="verTicketDeOrden(${o.id})">Ver ticket</button>`}
      </td>
    </tr>
  `).join('');
}

    <div class="modal-header">

          <label>Cliente *</label>

          </select>
        </div>

            <select id="selector-art-rapido" style="font-size:13px;padding:5px 8px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);height:32px">
              <option value="">Elegir artículo...</option>
              ${DB.articulos.map(a=>`<option value="${a.id}">${a.nombre} (${a.codigo})</option>`).join('')}

      <div class="totals-box" style="margin-top:12px">

function abrirSelectorVariantes() {
  const artId = parseInt(document.getElementById('selector-art-rapido')?.value);
  if (!artId) { showToast('Primero elegí un artículo del selector'); return; }
  const art = DB.articulos.find(a=>a.id===artId);
  if (!art) return;

  const variantesHtml = art.variantes.length
    ? art.variantes.map((v,i) => `
        <tr>
          <td style="padding:10px 12px">
            <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:13px;text-transform:none;letter-spacing:0;font-weight:400;color:var(--text)">
              <input type="checkbox" id="sv-check-${i}" checked style="width:16px;height:16px;accent-color:var(--accent);cursor:pointer" onchange="toggleSVRow(${i})">
              <span style="font-weight:600">${v.color}</span>
            </label>
          </td>
          <td style="padding:10px 12px">
            <span class="badge ${v.stock>0?'badge-green':v.stock<0?'badge-red':'badge-amber'}">${v.stock > 0 ? 'Stock: '+v.stock : v.stock === 0 ? 'Sin stock' : 'Stock: '+v.stock}</span>
          </td>
          <td style="padding:10px 12px">
            <input type="number" id="sv-cant-${i}" value="1" min="0" style="width:80px;font-size:13px;padding:5px 8px" oninput="calcSVTotal(${artId})" />
          </td>
          <td style="padding:10px 12px">
            <input type="number" id="sv-precio-${i}" value="${art.precio}" style="width:110px;font-size:13px;padding:5px 8px" oninput="calcSVTotal(${artId})" />
          </td>
          <td style="padding:10px 12px;font-weight:600;text-align:right" id="sv-sub-${i}">${fmtMoney(art.precio)}</td>
        </tr>`)
      .join('')
    : `<tr><td colspan="5" style="padding:20px;text-align:center;color:var(--text3)">Este artículo no tiene variantes de color definidas</td></tr>`;

  showModal('modal-sv', `
    <div class="modal-header">
      <span class="modal-title">⚡ ${art.nombre} <span style="font-size:12px;color:var(--text3);font-weight:400">${art.codigo}</span></span>
      <button class="close-btn" onclick="closeModal('modal-sv')">✕</button>
    </div>
    <div class="modal-body" style="padding:0">
      <div style="padding:12px 20px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;gap:16px;align-items:center;flex-wrap:wrap">
        <span style="font-size:13px;color:var(--text2)">Precio base: <strong>${fmtMoney(art.precio)}</strong></span>
        <button class="btn btn-secondary btn-sm" onclick="svSeleccionarTodas(${art.variantes.length})">✓ Todas</button>
        <button class="btn btn-secondary btn-sm" onclick="svDeseleccionarTodas(${art.variantes.length})">✗ Ninguna</button>
        <button class="btn btn-secondary btn-sm" onclick="svSetCantidad(${art.variantes.length})">= Misma cantidad</button>
        <span style="margin-left:auto;font-size:13px;color:var(--text2)">Total: <strong id="sv-total-display">${fmtMoney(art.precio * art.variantes.length)}</strong></span>
      </div>
      <div class="table-wrap">
        <table style="width:100%">
          <thead><tr>
            <th style="padding:10px 12px">Variante</th>
            <th style="padding:10px 12px">Stock actual</th>
            <th style="padding:10px 12px">Cantidad</th>
            <th style="padding:10px 12px">Precio unit.</th>
            <th style="padding:10px 12px;text-align:right">Subtotal</th>
          </tr></thead>
          <tbody>${variantesHtml}</tbody>
        </table>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-sv')">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmarSelectorVariantes(${artId})">Agregar al pedido</button>
    </div>
  `, 'modal-lg');

  calcSVTotal(artId);
}

function toggleSVRow(i) {
  const checked = document.getElementById('sv-check-'+i)?.checked;
  const cantInput = document.getElementById('sv-cant-'+i);
  if (cantInput) cantInput.disabled = !checked;
}

function svSeleccionarTodas(n) {
  for (let i=0;i<n;i++) {
    const cb = document.getElementById('sv-check-'+i);
    const ci = document.getElementById('sv-cant-'+i);
    if (cb) { cb.checked=true; if(ci) ci.disabled=false; }
  }
}

function svDeseleccionarTodas(n) {
  for (let i=0;i<n;i++) {
    const cb = document.getElementById('sv-check-'+i);
    const ci = document.getElementById('sv-cant-'+i);
    if (cb) { cb.checked=false; if(ci) ci.disabled=true; }
  }
}

function svSetCantidad(n) {
  const primera = document.getElementById('sv-cant-0')?.value || '1';
  const val = prompt('¿Qué cantidad para todas las variantes seleccionadas?', primera);
  if (val === null) return;
  const num = parseInt(val) || 1;
  for (let i=0;i<n;i++) {
    const cb = document.getElementById('sv-check-'+i);
    const ci = document.getElementById('sv-cant-'+i);
    if (cb?.checked && ci) ci.value = num;
  }
  const art = DB.articulos.find(a=>a.variantes.length===n);
}

function calcSVTotal(artId) {
  const art = DB.articulos.find(a=>a.id===artId);
  if (!art) return;
  let total = 0;
  art.variantes.forEach((v,i) => {
    const checked = document.getElementById('sv-check-'+i)?.checked;
    const cant = parseFloat(document.getElementById('sv-cant-'+i)?.value)||0;
    const precio = parseFloat(document.getElementById('sv-precio-'+i)?.value)||0;
    const sub = checked ? cant * precio : 0;
    const subEl = document.getElementById('sv-sub-'+i);
    if (subEl) subEl.textContent = fmtMoney(sub);
    total += sub;
  });
  const el = document.getElementById('sv-total-display');
  if (el) el.textContent = fmtMoney(total);
}

function confirmarSelectorVariantes(artId) {
  const art = DB.articulos.find(a=>a.id===artId);
  if (!art) return;
  let agregados = 0;
  art.variantes.forEach((v,i) => {
    const checked = document.getElementById('sv-check-'+i)?.checked;
    if (!checked) return;
    const cant = parseFloat(document.getElementById('sv-cant-'+i)?.value)||0;
    const precio = parseFloat(document.getElementById('sv-precio-'+i)?.value)||0;
    if (cant <= 0) return;
    agregarFilaOrden(art, v.color, cant, precio);
    agregados++;
  });
  closeModal('modal-sv');
  if (agregados > 0) showToast(`${agregados} variante${agregados>1?'s':''} agregada${agregados>1?'s':''} al pedido`);
  else showToast('No se seleccionó ninguna variante con cantidad > 0');
}

function agregarFilaOrden(art, color, cant, precio) {
  const tbody = document.getElementById('orden-items');
  if (!tbody) return;
  const idx = Date.now() + Math.random();
  const idxStr = idx.toString().replace('.','');
  const tr = document.createElement('tr');
  tr.id = 'item-row-'+idxStr;
  tr.innerHTML = `
    <td style="font-size:13px;padding:7px 8px;font-weight:500">${art.nombre} <span style="color:var(--text3);font-size:11px">${art.codigo}</span></td>
    <td style="padding:7px 8px">
      <span style="background:var(--surface2);padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600">${color||'—'}</span>
    </td>
    <td style="padding:7px 8px"><input type="number" id="item-cant-${idxStr}" value="${cant}" min="1" oninput="calcOrdenTotal()" style="width:70px"></td>
    <td style="padding:7px 8px"><input type="number" id="item-precio-${idxStr}" value="${precio}" oninput="calcOrdenTotal()" style="width:100px"></td>
    <td id="item-sub-${idxStr}" style="font-weight:600;padding:7px 8px">${fmtMoney(cant*precio)}</td>
    <td style="padding:7px 8px">
      <button class="remove-row" onclick="document.getElementById('item-row-${idxStr}').remove();calcOrdenTotal()" title="Eliminar">✕</button>
    </td>
  `;
  tr.dataset.artId = art.id;
  tr.dataset.color = color;
  tbody.appendChild(tr);
  calcOrdenTotal();
}

function addOrdenItem() {
  const tbody = document.getElementById('orden-items');
  if (!tbody) return;
  const idx = Date.now();
  const artOpts = DB.articulos.map(a=>`<option value="${a.id}">${a.nombre} (${a.codigo})</option>`).join('');
  const tr = document.createElement('tr');
  tr.id = 'item-row-'+idx;
  tr.innerHTML = `
    <td><select onchange="updateVariantes(this,${idx})" class="item-art" data-idx="${idx}">
      <option value="">Seleccionar...</option>${artOpts}
    </select></td>
    <td><select id="item-var-${idx}"><option value="">-</option></select></td>
    <td><input type="number" id="item-cant-${idx}" value="1" min="1" oninput="calcOrdenTotal()" style="width:70px"></td>
    <td><input type="number" id="item-precio-${idx}" value="" oninput="calcOrdenTotal()" style="width:100px" placeholder="0.00"></td>
    <td id="item-sub-${idx}" style="font-weight:600">$ 0</td>
    <td><button class="remove-row" onclick="document.getElementById('item-row-${idx}').remove();calcOrdenTotal()">✕</button></td>
  `;
  tbody.appendChild(tr);
}

function updateVariantes(sel, idx) {
  const art = DB.articulos.find(a=>a.id==sel.value);
  const varSel = document.getElementById('item-var-'+idx);
  const precioInput = document.getElementById('item-precio-'+idx);
  if (!art) { varSel.innerHTML='<option value="">-</option>'; return; }
  varSel.innerHTML = '<option value="">Sin variante</option>' + art.variantes.map(v=>
    `<option value="${v.color}">${v.color} (stock: ${v.stock})</option>`
  ).join('');
  if (precioInput && !precioInput.value) precioInput.value = art.precio;
  calcOrdenTotal();
}

function calcOrdenTotal() {
  const rows = document.querySelectorAll('#orden-items tr');
  let total = 0;
  rows.forEach(tr => {
    const idx = tr.id.replace('item-row-','');
    const cant = parseFloat(document.getElementById('item-cant-'+idx)?.value)||0;
    const precio = parseFloat(document.getElementById('item-precio-'+idx)?.value)||0;
    const sub = cant*precio;
    const subEl = document.getElementById('item-sub-'+idx);
    if (subEl) subEl.textContent = fmtMoney(sub);
    total += sub;
  });
  const el = document.getElementById('orden-total-display');
  if (el) el.textContent = fmtMoney(total);
}

function guardarOrden() {
  const clienteId = parseInt(document.getElementById('orden-cliente').value);
  if (!clienteId) { alert('Seleccioná un cliente'); return; }

  const fecha = document.getElementById('orden-fecha').value;
  const obs = document.getElementById('orden-obs').value;
  const rows = document.querySelectorAll('#orden-items tr');
  const items = [];

  rows.forEach(tr => {
    const idx = tr.id.replace('item-row-','');

    // Filas agregadas por selector rápido (tienen dataset.artId)
    if (tr.dataset.artId) {
      const artId = parseInt(tr.dataset.artId);
      const color = tr.dataset.color || '';
      const cant = parseFloat(document.getElementById('item-cant-'+idx)?.value)||0;
      const precio = parseFloat(document.getElementById('item-precio-'+idx)?.value)||0;
      if (artId && cant > 0) {
        const art = DB.articulos.find(a=>a.id===artId);
        items.push({ articuloId:artId, nombre:art?.nombre||'', codigo:art?.codigo||'', color, cant, precio, subtotal:cant*precio });
      }
      return;
    }

    // Filas manuales (tienen select .item-art)
    const artId = parseInt(tr.querySelector('.item-art')?.value);
    const color = document.getElementById('item-var-'+idx)?.value || '';
    const cant = parseFloat(document.getElementById('item-cant-'+idx)?.value)||0;
    const precio = parseFloat(document.getElementById('item-precio-'+idx)?.value)||0;
    if (artId && cant > 0) {
      const art = DB.articulos.find(a=>a.id===artId);
      items.push({ articuloId:artId, nombre:art?.nombre||'', codigo:art?.codigo||'', color, cant, precio, subtotal:cant*precio });
    }
  });

  if (!items.length) { alert('Agregá al menos un artículo con cantidad mayor a cero'); return; }

  const total = items.reduce((s,i)=>s+i.subtotal,0);
  const orden = {
    id: Date.now(), numero: DB.config.nextOrden++, fecha, clienteId,
    vendedorId: currentUser.id, items, total, estado:'pendiente', obs
  };
  DB.ordenes.push(orden);
  closeModal('modal-orden');
  renderOrdenes();
  showToast('Orden creada correctamente');
}

function togglePagoTicket() {
  const paga = document.getElementById('ticket-paga').value;
  document.getElementById('ticket-caja-grp').style.display = paga==='si'?'block':'none';

}

function confirmarTicket(ordenId) {
  const o = DB.ordenes.find(x=>x.id===ordenId);
  if (!o) return;
  
  // Descontar stock
  o.items.forEach(item => {
    const art = DB.articulos.find(a=>a.id===item.articuloId);
    if (art) {
      const variante = art.variantes.find(v=>v.color===item.color);
      if (variante) variante.stock -= item.cant;
      else if (art.variantes.length===0 || !item.color) {
        // artículo sin variantes - ignorar por ahora
      }
    }
  });
  
  const ticket = {
    id: Date.now(), numero: DB.config.nextTicket++, fecha: todayDate(),
    ordenId, clienteId: o.clienteId, vendedorId: o.vendedorId,
    items: o.items, total: o.total
  };
  DB.tickets.push(ticket);
  o.estado = 'facturado';
  o.ticketId = ticket.id;
  
  // Cargar en cuenta corriente
  // (el pago reduce la deuda, el ticket aumenta)
  
  // Si paga ahora
  const paga = document.getElementById('ticket-paga')?.value;
  if (paga==='si') {
    const monto = parseFloat(document.getElementById('ticket-monto')?.value)||0;
    const forma = document.getElementById('ticket-forma')?.value||'Efectivo';
    const cajaId = parseInt(document.getElementById('ticket-caja')?.value);
    if (monto>0 && cajaId) {
      registrarPagoInterno(o.clienteId, monto, forma, cajaId, ticket.id, ordenId);
    }
  }
  
  closeModal('modal-emit-ticket');
  imprimirRemito(ticket.id);
  renderOrdenes();
  showToast('Ticket emitido y stock actualizado');
}

function getClientesVisibles() {

  return DB.clientes;
}

function renderClientes() {
  const topbar = document.getElementById('topbar-actions');
  topbar.innerHTML = currentUser.role!=='externo' ? `<button class="btn btn-primary" onclick="abrirNuevoCliente()">+ Nuevo cliente</button>` : '';

        <div class="search-bar" style="max-width:300px">

        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Nombre</th><th>CUIT</th><th>Teléfono</th><th>Email</th><th>Saldo CC</th><th>Acciones</th></tr></thead>
          <tbody id="tabla-clientes"></tbody>
        </table>
      </div>

  `;
  filtrarClientes('');
}

function filtrarClientes(q) {
  const lista = getClientesVisibles().filter(c =>
    c.nombre.toLowerCase().includes(q.toLowerCase()) ||
    (c.cuit||'').includes(q)
  );
  const tbody = document.getElementById('tabla-clientes');
  if (!tbody) return;
  if (!lista.length) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--text3);padding:40px">Sin clientes</td></tr>';
    return;
  }
  tbody.innerHTML = lista.map(c => {
    const saldo = calcSaldoCC(c.id);
    return `<tr>
      <td style="font-weight:600">${c.nombre}</td>
      <td style="font-family:monospace;font-size:12px">${c.cuit||'-'}</td>
      <td>${c.telefono||'-'}</td>
      <td>${c.email||'-'}</td>
      <td class="${saldo>0?'mov-neg':saldo<0?'mov-pos':''}" style="font-weight:600">${fmtMoney(saldo)}</td>
      <td>
        <button class="btn btn-sm btn-secondary" onclick="verCuentaCorriente(${c.id})">Cuenta corriente</button>
        ${currentUser.role!=='externo'?`<button class="btn btn-sm btn-secondary" onclick="editarCliente(${c.id})" style="margin-left:4px">Editar</button>`:''}
      </td>
    </tr>`;
  }).join('');
}

function calcSaldoCC(clienteId) {
  // Deuda = suma tickets - suma pagos
  const deudaTickets = DB.tickets.filter(t=>t.clienteId===clienteId).reduce((s,t)=>s+t.total,0);
  const pagosRealizados = DB.pagos.filter(p=>p.clienteId===clienteId).reduce((s,p)=>s+p.monto,0);
  return deudaTickets - pagosRealizados;
}

function guardarCliente(editId) {
  const nombre = document.getElementById('cli-nombre').value.trim();
  if (!nombre) { alert('Ingresá el nombre'); return; }
  const data = {
    nombre, cuit: document.getElementById('cli-cuit').value,
    telefono: document.getElementById('cli-tel').value,
    email: document.getElementById('cli-email').value,
    direccion: document.getElementById('cli-dir').value,
    notas: document.getElementById('cli-notas').value
  };
  if (editId) {
    const c = DB.clientes.find(x=>x.id===editId);
    if (c) Object.assign(c, data);
  } else {
    DB.clientes.push({ id: Date.now(), ...data });
  }
  closeModal('modal-cliente');
  renderClientes();
  showToast('Cliente guardado');
}

function verCuentaCorriente(clienteId) {
  const c = getCliente(clienteId);
  const tickets = DB.tickets.filter(t=>t.clienteId===clienteId);
  const pagos = DB.pagos.filter(p=>p.clienteId===clienteId);
  const saldo = calcSaldoCC(clienteId);

  const movs = [
    ...tickets.map(t=>({fecha:t.fecha, tipo:'ticket', desc:`Remito X #${String(t.numero).padStart(4,'0')}`, debe:t.total, haber:0})),
    ...pagos.map(p=>({fecha:p.fecha, tipo:'pago', desc:`Pago - ${p.formaPago}${p.referencia?' - '+p.referencia:''}`, debe:0, haber:p.monto}))
  ].sort((a,b)=>a.fecha.localeCompare(b.fecha));

  // Calcular saldo acumulado por fila
  let saldoAcum = 0;
  const movsConSaldo = movs.map(m => {

  if (video && video._stream) video._stream.getTracks().forEach(t => t.stop());
  window._sqrScanActive = false;

function iniciarCamaraStockQR() {
  const cont = document.getElementById('sqr-camara-cont');
  if (!cont) return;
  cont.innerHTML = `
    <div style="background:#000;border-radius:var(--radius);overflow:hidden;position:relative;max-width:340px;margin:0 auto">
      <video id="sqr-video" style="width:100%;display:block" playsinline autoplay></video>
      <canvas id="sqr-canvas" style="display:none"></canvas>
      <div style="position:absolute;inset:0;pointer-events:none;display:flex;align-items:center;justify-content:center">
        <div style="width:200px;height:200px;border:3px solid rgba(255,255,255,0.8);border-radius:12px;box-shadow:0 0 0 9999px rgba(0,0,0,0.4)"></div>
      </div>
      <div id="sqr-status" style="position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.6);color:white;text-align:center;padding:8px;font-size:13px">
        Apuntá al QR del bulto
      </div>
    </div>
    <button class="btn btn-secondary btn-sm" style="margin-top:8px;width:100%;justify-content:center" onclick="detenerCamaraStockQR()">✕ Cerrar cámara</button>
  `;
  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
    .then(stream => {
      const video = document.getElementById('sqr-video');
      if (!video) { stream.getTracks().forEach(t => t.stop()); return; }
      video.srcObject = stream;
      video._stream = stream;
      sqrScanLoop();
    })
    .catch(err => {
      cont.innerHTML = `<div class="alert alert-danger">No se pudo acceder a la cámara: ${err.message}</div>`;
    });
}

function detenerCamaraStockQR() {
  const video = document.getElementById('sqr-video');
  if (video && video._stream) video._stream.getTracks().forEach(t => t.stop());
  window._sqrScanActive = false;
  const cont = document.getElementById('sqr-camara-cont');
  if (cont) cont.innerHTML = `<button class="btn btn-primary" style="width:100%;justify-content:center;font-size:15px;padding:12px" onclick="iniciarCamaraStockQR()">📷 Activar cámara para escanear</button>`;
}

function sqrScanLoop() {
  window._sqrScanActive = true;
  function tick() {
    if (!window._sqrScanActive) return;
    if (!document.getElementById('overlay-modal-stock-qr')) { window._sqrScanActive = false; return; }
    const video = document.getElementById('sqr-video');
    const canvas = document.getElementById('sqr-canvas');
    if (!video || !canvas || video.readyState !== video.HAVE_ENOUGH_DATA) { requestAnimationFrame(tick); return; }
    canvas.width = video.videoWidth; canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    if (window.BarcodeDetector) {
      new BarcodeDetector({ formats: ['qr_code'] }).detect(canvas)
        .then(codes => {
          if (codes.length > 0) {
            window._sqrScanActive = false;
            procesarQRStockEscaneado(codes[0].rawValue);
            const status = document.getElementById('sqr-status');
            if (status) {
              status.textContent = '✓ Escaneado!';
              status.style.background = 'rgba(22,163,74,0.8)';
            }
            setTimeout(() => {
              const s2 = document.getElementById('sqr-status');
              if (s2) { s2.textContent = 'Apuntá al siguiente bulto'; s2.style.background = 'rgba(0,0,0,0.6)'; }
              window._sqrScanActive = true;
              requestAnimationFrame(tick);
            }, 1500);
          } else { requestAnimationFrame(tick); }
        }).catch(() => requestAnimationFrame(tick));
    } else {
      const status = document.getElementById('sqr-status');
      if (status) status.textContent = 'Cámara sin detección automática — usá lector físico';
      window._sqrScanActive = false;
    }
  }
  requestAnimationFrame(tick);
}

// Also listen for physical scanner keyboard input
(function() {
  let sqrBuf = '', sqrTimer = null;
  document.addEventListener('keydown', e => {
    if (!document.getElementById('overlay-modal-stock-qr')) return;
    if (e.key === 'Enter' && sqrBuf.length > 2) {
      procesarQRStockEscaneado(sqrBuf.trim());
      sqrBuf = ''; return;
    }
    if (e.key.length === 1) {
      sqrBuf += e.key;
      clearTimeout(sqrTimer);
      sqrTimer = setTimeout(() => { sqrBuf = ''; }, 200);
    }
  });
})();

function procesarQRStockEscaneado(raw) {
  let codigo = raw, variante = null, bulto = 1;
  try {
    const p = JSON.parse(raw);
    if (p.codigo) { codigo = p.codigo; variante = p.variante || null; bulto = p.bulto || 1; }
  } catch(e) {}

  const art = DB.articulos.find(a => a.codigo === codigo);
  if (!art) {
    showToastErr('⚠ Artículo no encontrado: ' + codigo);
    return;
  }

  if (!window._sqrItems) window._sqrItems = [];

  // Check if already in list — accumulate
  const key = codigo + '|' + (variante||'');
  const existing = window._sqrItems.find(i => i.key === key);
  if (existing) {
    existing.cantidad += bulto;
    existing.escaneados++;
  } else {
    window._sqrItems.push({ key, articuloId: art.id, nombre: art.nombre, codigo, variante, bulto, cantidad: bulto, escaneados: 1 });
  }
  renderSQRLista();
  showToastOk('✓ ' + art.nombre + (variante ? ' ' + variante : '') + ' +' + bulto + ' u');
}

function renderSQRLista() {
  const lista = document.getElementById('sqr-lista');
  const btn = document.getElementById('sqr-confirmar-btn');
  const items = window._sqrItems || [];
  if (!lista) return;
  if (!items.length) {
    lista.innerHTML = '<p style="color:var(--text3);font-size:13px;text-align:center">Aún no escaneaste ningún bulto</p>';
    if (btn) { btn.disabled = true; btn.style.opacity = '0.5'; }
    return;
  }
  lista.innerHTML = `
    <table style="width:100%">
      <thead><tr>
        <th>Artículo</th><th>Variante</th><th>Bultos</th><th>Unidades</th><th></th>
      </tr></thead>
      <tbody>${items.map((item, i) => `<tr>
        <td style="font-weight:600">${item.nombre}</td>
        <td>${item.variante ? `<span class="badge badge-purple">${item.variante}</span>` : '<span style="color:var(--text3)">—</span>'}</td>
        <td style="text-align:center">${item.escaneados}</td>
        <td style="font-size:16px;font-weight:700;color:var(--accent)">${item.cantidad}</td>

        <td style="padding:8px;font-size:18px;font-weight:700;color:var(--green)">${items.reduce((s,i)=>s+i.cantidad,0)}</td>
        <td></td>

    </table>
  `;
  if (btn) { btn.disabled = false; btn.style.opacity = '1'; }
}

function quitarItemSQR(idx) {
  window._sqrItems.splice(idx, 1);
  renderSQRLista();
}

function confirmarCargaStockQR() {
  const items = window._sqrItems || [];
  if (!items.length) return;
  let actualizados = 0;
  items.forEach(item => {
    const art = DB.articulos.find(a => a.id === item.articuloId);
    if (!art) return;
    if (item.variante) {
      const v = art.variantes.find(v => v.color.toLowerCase() === item.variante.toLowerCase());
      if (v) { v.stock += item.cantidad; actualizados++; }
    } else {
      // No variante — suma a todas o a la primera
      if (art.variantes.length > 0) art.variantes[0].stock += item.cantidad;
      actualizados++;
    }
  });
  cerrarCargaStockQR();
  renderTablaArticulos();
  showToastOk('✅ Stock actualizado — ' + actualizados + ' artículo' + (actualizados!==1?'s':'') + ' modificado' + (actualizados!==1?'s':''));
}

      <td>${fmtMoney(a.precio)}</td>

  const c = varCount++;
  const cont = document.getElementById('art-variantes');
  const coloresOpts = DB.colores.map(col=>`<option>${col}</option>`).join('');
  const div = document.createElement('div');

  div.id='vart-'+c;

function guardarArticulo(editId) {
  const codigo = document.getElementById('art-codigo').value.trim();
  const nombre = document.getElementById('art-nombre').value.trim();
  if (!codigo||!nombre) { alert('Completá código y nombre'); return; }
  const precio = parseFloat(document.getElementById('art-precio').value)||0;
  
  const variantes = [];
  document.querySelectorAll('#art-variantes [id^="vart-"]').forEach(div => {
    const idx = div.id.replace('vart-','');
    const color = document.getElementById('vcolor-'+idx)?.value;
    const stock = parseInt(document.getElementById('vstock-'+idx)?.value)||0;
    if (color) variantes.push({color, stock});
  });
  
  const bulto = parseInt(document.getElementById('art-bulto')?.value)||1;
  if (editId) {
    const a = DB.articulos.find(x=>x.id===editId);
    if (a) Object.assign(a, {codigo, nombre, precio, variantes, unidadesBulto:bulto});
  } else {
    DB.articulos.push({id:Date.now(), codigo, nombre, precio, variantes, unidadesBulto:bulto});
  }
  closeModal('modal-articulo');
  renderTablaArticulos();
  showToast('Artículo guardado');
}

function cargarOrdenesPago() {
  const clienteId = parseInt(document.getElementById('pago-cliente')?.value);
  const sel = document.getElementById('pago-orden');
  if (!sel) return;
  sel.innerHTML = '<option value="">— Pago a cuenta (sin asignar) —</option>';
  if (!clienteId) return;

  // Órdenes pendientes o facturadas con saldo pendiente
  const ordenes = DB.ordenes.filter(o => o.clienteId === clienteId);
  ordenes.forEach(o => {
    const pagosOrden = DB.pagos.filter(p => p.ordenId === o.id).reduce((s,p)=>s+p.monto,0);
    const saldoOrden = o.total - pagosOrden;
    if (saldoOrden > 0) {
      const opt = document.createElement('option');
      opt.value = o.id;
      opt.dataset.total = o.total;
      opt.dataset.saldo = saldoOrden;
      opt.textContent = `Orden #${String(o.numero).padStart(4,'0')} — Total: ${fmtMoney(o.total)} — Saldo: ${fmtMoney(saldoOrden)} (${o.estado})`;
      sel.appendChild(opt);
    }
  });
}

function autocompletarMontoPago() {
  const sel = document.getElementById('pago-orden');
  const montoInput = document.getElementById('pago-monto');
  if (!sel || !montoInput) return;
  const opt = sel.options[sel.selectedIndex];
  if (opt && opt.dataset.saldo) {
    montoInput.value = parseFloat(opt.dataset.saldo).toFixed(2);
  }
}

function guardarPago() {
  const clienteId = parseInt(document.getElementById('pago-cliente').value);
  const monto = parseFloat(document.getElementById('pago-monto').value);
  if (!clienteId || !monto || monto <= 0) { alert('Completá cliente y monto'); return; }

  const cajaId = parseInt(document.getElementById('pago-caja').value);
  const forma = document.getElementById('pago-forma').value;
  const ordenIdRaw = document.getElementById('pago-orden').value;
  const ordenId = ordenIdRaw ? parseInt(ordenIdRaw) : null;

  // Si se asignó a orden, buscar el ticket asociado
  let ticketId = null;
  if (ordenId) {
    const orden = DB.ordenes.find(o=>o.id===ordenId);
    if (orden?.ticketId) ticketId = orden.ticketId;
  }

  registrarPagoInterno(
    clienteId, monto, forma, cajaId,
    ticketId, ordenId,
    document.getElementById('pago-fecha').value,
    document.getElementById('pago-ref').value,
    document.getElementById('pago-notas').value
  );
  closeModal('modal-pago');
  if (activeModule==='pagos') renderPagos();
  else if (activeModule==='tesoreria') renderTesoreria();
  const etiqueta = ordenId ? `Pago asignado a Orden #${String(DB.ordenes.find(o=>o.id===ordenId)?.numero||0).padStart(4,'0')}` : 'Pago a cuenta registrado';
  showToast(etiqueta);
}

function abrirAsignarPago(pagoId) {
  const pago = DB.pagos.find(p=>p.id===pagoId);
  if (!pago) return;
  const cliente = getCliente(pago.clienteId);

  const ordenes = DB.ordenes.filter(o => o.clienteId === pago.clienteId);
  const optsOrdenes = ordenes.map(o => {
    const pagosOrden = DB.pagos.filter(p=>p.ordenId===o.id && p.id!==pagoId).reduce((s,p)=>s+p.monto,0);
    const saldo = o.total - pagosOrden;
    return `<option value="${o.id}" data-total="${o.total}" data-saldo="${saldo}">
      Orden #${String(o.numero).padStart(4,'0')} — ${fmtFecha(o.fecha)} — Total: ${fmtMoney(o.total)} — Saldo: ${fmtMoney(saldo)} [${o.estado}]
    </option>`;
  }).join('');

  if (!ordenes.length) {
    showToast('Este cliente no tiene órdenes de venta cargadas todavía');
    return;
  }

  showModal('modal-asignar-pago', `
    <div class="modal-header">
      <span class="modal-title">Asignar pago a orden</span>
      <button class="close-btn" onclick="closeModal('modal-asignar-pago')">✕</button>
    </div>
    <div class="modal-body">
      <div style="background:var(--surface2);border-radius:var(--radius-sm);padding:14px;margin-bottom:16px">
        <div style="font-size:12px;color:var(--text3);margin-bottom:4px">Pago a cuenta</div>
        <div style="display:flex;gap:24px;flex-wrap:wrap">
          <span><strong>Cliente:</strong> ${cliente?.nombre||'-'}</span>
          <span><strong>Monto:</strong> <span class="mov-pos" style="font-weight:700">${fmtMoney(pago.monto)}</span></span>
          <span><strong>Fecha:</strong> ${fmtFecha(pago.fecha)}</span>
          <span><strong>Forma:</strong> ${pago.formaPago}</span>
        </div>
      </div>
      <div class="form-group">
        <label>Seleccioná la orden a vincular *</label>
        <select id="asignar-orden" style="font-size:13px" onchange="mostrarInfoOrdenAsignar(this)">
          <option value="">Elegir orden...</option>
          ${optsOrdenes}
        </select>
      </div>
      <div id="info-orden-asignar" style="display:none;background:var(--accent-light);border-radius:var(--radius-sm);padding:12px;font-size:13px;margin-top:8px"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-asignar-pago')">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmarAsignarPago(${pagoId})">Vincular pago</button>
    </div>
  `);
}

function mostrarInfoOrdenAsignar(sel) {
  const info = document.getElementById('info-orden-asignar');
  const opt = sel.options[sel.selectedIndex];
  if (!sel.value || !opt) { info.style.display='none'; return; }
  const saldo = parseFloat(opt.dataset.saldo)||0;
  const total = parseFloat(opt.dataset.total)||0;
  info.style.display = 'block';
  info.innerHTML = `
    <strong>Total de la orden:</strong> ${fmtMoney(total)} &nbsp;|&nbsp;
    <strong>Saldo pendiente:</strong> ${fmtMoney(saldo)}
  `;
}

function confirmarAsignarPago(pagoId) {
  const ordenId = parseInt(document.getElementById('asignar-orden')?.value);
  if (!ordenId) { alert('Seleccioná una orden'); return; }

  const pago = DB.pagos.find(p=>p.id===pagoId);
  if (!pago) return;
  pago.ordenId = ordenId;

  const orden = DB.ordenes.find(o=>o.id===ordenId);
  if (orden?.ticketId) pago.ticketId = orden.ticketId;

  closeModal('modal-asignar-pago');
  renderPagos();
  showToast(`Pago vinculado a Orden #${String(orden?.numero||0).padStart(4,'0')}`);
}

function registrarPagoInterno(clienteId, monto, forma, cajaId, ticketId, ordenId, fecha, referencia, notas) {
  const pago = {
    id: Date.now(), numero: DB.config.nextPago++,
    fecha: fecha||todayDate(), clienteId, vendedorId: currentUser.id,
    monto, formaPago: forma, cajaId, ticketId: ticketId||null, ordenId: ordenId||null,
    referencia: referencia||'', notas: notas||''
  };
  DB.pagos.push(pago);

  const caja = DB.cajas.find(c=>c.id===cajaId);
  if (caja) {
    caja.saldo += monto;
    caja.movimientos.push({
      id: Date.now()+1, fecha: pago.fecha, tipo:'entrada',
      descripcion: `Pago ${getCliente(clienteId)?.nombre||''} - ${forma}${ordenId?' (Orden #'+String(DB.ordenes.find(o=>o.id===ordenId)?.numero||0).padStart(4,'0')+')':''}`,
      monto, saldoResultante: caja.saldo
    });
  }
}

function guardarCaja() {

  const caja = {id:Date.now(), nombre, saldo, movimientos:[]};
  if (saldo!==0) caja.movimientos.push({id:Date.now()+1,fecha:todayDate(),tipo:saldo>0?'entrada':'salida',descripcion:'Saldo inicial',monto:Math.abs(saldo),saldoResultante:saldo});

  closeModal('modal-caja');
  renderTesoreria();
  showToast('Caja creada');
}

function guardarMovCaja() {
  const cajaId = parseInt(document.getElementById('mc-caja').value);
  const tipo = document.getElementById('mc-tipo').value;
  const monto = parseFloat(document.getElementById('mc-monto').value)||0;
  const fecha = document.getElementById('mc-fecha').value;
  const desc = document.getElementById('mc-desc').value||tipo;
  if (!monto) { alert('Ingresá un monto'); return; }
  const caja = DB.cajas.find(c=>c.id===cajaId);
  if (caja) {
    caja.saldo += tipo==='entrada' ? monto : -monto;
    caja.movimientos.push({id:Date.now(),fecha,tipo,descripcion:desc,monto,saldoResultante:caja.saldo});
  }
  closeModal('modal-mov-caja');
  renderTesoreria();
  showToast('Movimiento registrado');
}

function abrirTransferenciaCaja() {
  if (DB.cajas.length<2) { alert('Necesitás al menos 2 cajas'); return; }
  const opts = DB.cajas.map(c=>`<option value="${c.id}">${c.nombre} (${fmtMoney(c.saldo)})</option>`).join('');
  showModal('modal-trans-caja', `

function guardarTransferenciaCaja() {
  const desdeId = parseInt(document.getElementById('tc-desde').value);
  const haciaId = parseInt(document.getElementById('tc-hacia').value);
  const monto = parseFloat(document.getElementById('tc-monto').value)||0;
  if (desdeId===haciaId) { alert('Las cajas deben ser distintas'); return; }
  if (!monto) { alert('Ingresá monto'); return; }
  const desde = DB.cajas.find(c=>c.id===desdeId);
  const hacia = DB.cajas.find(c=>c.id===haciaId);
  const fecha = todayDate();
  desde.saldo -= monto;
  desde.movimientos.push({id:Date.now(),fecha,tipo:'salida',descripcion:`Transferencia a ${hacia.nombre}`,monto,saldoResultante:desde.saldo});

  hacia.movimientos.push({id:Date.now()+1,fecha,tipo:'entrada',descripcion:`Transferencia desde ${desde.nombre}`,monto,saldoResultante:hacia.saldo});

function showReporte(tipo, btn) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  
  if (tipo==='ventas-mes') {
    // Agrupar tickets por mes
    const meses = {};
    DB.tickets.forEach(t => {
      const m = t.fecha.substring(0,7);
      if (!meses[m]) meses[m] = {total:0, cantidad:0};
      meses[m].total += t.total;
      meses[m].cantidad++;
    });
    const rows = Object.entries(meses).sort((a,b)=>a[0].localeCompare(b[0]));
    document.getElementById('reporte-content').innerHTML = `
      <div class="card" style="padding:0">
        <table><thead><tr><th>Mes</th><th>Cantidad de ventas</th><th>Total facturado</th></tr></thead>
        <tbody>${rows.length ? rows.map(([m,d])=>`<tr>
          <td>${fmtMes(m)}</td><td>${d.cantidad}</td>
          <td style="font-weight:600">${fmtMoney(d.total)}</td>
        </tr>`).join('') : '<tr><td colspan="3" style="text-align:center;color:var(--text3);padding:40px">Sin datos</td></tr>'}</tbody>
        </table></div>`;
  } else if (tipo==='ventas-vendedor') {
    const vends = {};
    DB.tickets.forEach(t => {
      const v = t.vendedorId;
      if (!vends[v]) vends[v]={total:0,cantidad:0};
      vends[v].total+=t.total; vends[v].cantidad++;
    });
    document.getElementById('reporte-content').innerHTML = `
      <div class="card" style="padding:0">
        <table><thead><tr><th>Vendedor</th><th>Rol</th><th>Cantidad</th><th>Total</th></tr></thead>
        <tbody>${Object.entries(vends).length ? Object.entries(vends).map(([vid,d])=>`<tr>
          <td style="font-weight:600">${getUser(parseInt(vid))?.name||'-'}</td>
          <td>${roleLabel(getUser(parseInt(vid))?.role||'')}</td>
          <td>${d.cantidad}</td><td>${fmtMoney(d.total)}</td>
        </tr>`).join('') : '<tr><td colspan="4" style="text-align:center;color:var(--text3);padding:40px">Sin datos</td></tr>'}</tbody>
        </table></div>`;
  } else if (tipo==='ventas-articulo') {
    const arts = {};
    DB.tickets.forEach(t=>t.items.forEach(item=>{
      const k = item.articuloId+'-'+item.color;
      if (!arts[k]) arts[k]={nombre:item.nombre,color:item.color||'-',cant:0,total:0};
      arts[k].cant+=item.cant; arts[k].total+=item.subtotal;
    }));
    document.getElementById('reporte-content').innerHTML = `
      <div class="card" style="padding:0">
        <table><thead><tr><th>Artículo</th><th>Variante</th><th>Unidades</th><th>Total facturado</th></tr></thead>
        <tbody>${Object.values(arts).length ? Object.values(arts).sort((a,b)=>b.total-a.total).map(d=>`<tr>
          <td style="font-weight:600">${d.nombre}</td><td>${d.color}</td>
          <td>${d.cant}</td><td>${fmtMoney(d.total)}</td>
        </tr>`).join('') : '<tr><td colspan="4" style="text-align:center;color:var(--text3);padding:40px">Sin datos</td></tr>'}</tbody>
        </table></div>`;
  }
}

function guardarUsuario(editId) {
  const name = document.getElementById('uu-name').value.trim();
  const username = document.getElementById('uu-user').value.trim();
  const pass = document.getElementById('uu-pass').value;
  const role = document.getElementById('uu-role').value;
  const initials = document.getElementById('uu-init').value.toUpperCase()||name.split(' ').map(w=>w[0]).join('').substring(0,2);
  if (!name||!username) { alert('Completá nombre y usuario'); return; }
  
  if (editId) {
    const u = DB.users.find(x=>x.id===editId);
    if (u) { u.name=name; u.username=username; u.role=role; u.initials=initials; if(pass) u.password=pass; }
  } else {
    if (!pass) { alert('Ingresá contraseña'); return; }
    DB.users.push({id:Date.now(),username,password:pass,name,role,initials});
  }
  
  // Asignar clientes a externo
  const userId = editId || DB.users[DB.users.length-1].id;
  if (role==='externo') {
    const sel = document.getElementById('uu-clientes');
    DB.clientesVendedor[userId] = [...sel.selectedOptions].map(o=>parseInt(o.value));
  }
  
  closeModal('modal-user');
  renderUsuarios();
  showToast('Usuario guardado');
}

function eliminarUsuario(id) {
  if (!confirm('¿Eliminar usuario? Esta acción no se puede deshacer.')) return;
  DB.users = DB.users.filter(u=>u.id!==id);
  renderUsuarios();
  showToast('Usuario eliminado');
}

// ===================== HELPERS =====================
function getCliente(id) { return DB.clientes.find(c=>c.id===id); }
function getUser(id) { return DB.users.find(u=>u.id===id); }
function getCaja(id) { return DB.cajas.find(c=>c.id===id); }

function fmtMoney(n) {
  return '$ ' + (n||0).toLocaleString('es-AR', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function fmtFecha(f) {
  if (!f) return '-';
  const [y,m,d] = f.split('-');
  return `${d}/${m}/${y}`;
}
function fmtMes(m) {
  const [y,mo] = m.split('-');
  const meses=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return `${meses[parseInt(mo)-1]} ${y}`;
}
function todayDate() {
  const d = new Date();
  return d.toISOString().split('T')[0];
}

function renderDeposito() {
  document.getElementById('topbar-actions').innerHTML = '';
  const ordenes = getOrdenesVisibles().filter(o => o.estado === 'pendiente' || (o.estado === 'facturado' && !o.preparado));

  document.getElementById('content').innerHTML = `
    <div class="tab-nav">
      <button class="tab-btn active" onclick="switchTabDeposito('pendientes',this)">

        ${ordenes.length ? `<span style="background:var(--amber);color:white;border-radius:20px;padding:1px 7px;font-size:11px;margin-left:4px">${ordenes.length}</span>` : ''}
      </button>
      <button class="tab-btn" onclick="switchTabDeposito('preparadas',this)">Preparadas (${preparadas.length})</button>

function switchTabDeposito(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const cont = document.getElementById('deposito-tab-content');
  if (!cont) return;

  if (tab === 'codigos') {
    renderCodigosBulto(cont);
    return;
  }

  const todas = getOrdenesVisibles();
  const lista = tab === 'pendientes'
    ? todas.filter(o => !o.preparado)
    : todas.filter(o => o.preparado);

  if (!lista.length) {
    cont.innerHTML = `<div class="empty-state"><p>${tab==='pendientes'?'No hay pedidos pendientes de preparar':'No hay pedidos preparados aún'}</p></div>`;
    return;
  }

  cont.innerHTML = `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px">
    ${[...lista].reverse().map(o => {
      const cliente = getCliente(o.clienteId);
      const totalItems = o.items.reduce((s,i)=>s+i.cant,0);
      const progreso = o.preparado ? 100 : (o.progPreparacion||0);
      return `<div class="card" style="cursor:pointer;transition:box-shadow 0.15s;border:${o.preparado?'2px solid var(--green)':'1px solid var(--border)'}" onclick="abrirPreparacion(${o.id})" onmouseover="this.style.boxShadow='var(--shadow-lg)'" onmouseout="this.style.boxShadow=''">

            <div style="font-family:monospace;font-size:13px;font-weight:700;color:var(--accent)">#${String(o.numero).padStart(4,'0')}</div>
            <div style="font-size:15px;font-weight:600;margin-top:2px">${cliente?.nombre||'-'}</div>
            <div style="font-size:12px;color:var(--text3)">${fmtFecha(o.fecha)} · ${o.items.length} producto${o.items.length!==1?'s':''} · ${totalItems} unidades</div>
          </div>
          <div style="font-size:22px">${o.preparado?'✅':'📦'}</div>
        </div>
        <div style="background:var(--surface2);border-radius:100px;height:8px;overflow:hidden;margin-bottom:8px">
          <div style="height:100%;border-radius:100px;background:${o.preparado?'var(--green)':'var(--accent)'};width:${progreso}%;transition:width 0.3s"></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text3)">
          <span>${o.preparado?'✓ Preparado y listo':'Tocá para preparar'}</span>
          <span>${progreso}%</span>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}
